<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Odin Sign Up Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <div class="background">
        <div class="logo-container">
          <img src="./odin-lined.png" alt="Odin Logo" />
          <span>ODIN</span>
        </div>
        <footer>
          Photo by
          <a
            href="https://unsplash.com/@katewarner?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Katelyn Warner</a
          >
          on
          <a
            href="https://unsplash.com/photos/city-skyline-with-skyscrapers-highway-and-train-fNfCjzJzSHA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText"
            >Unsplash</a
          >
        </footer>
      </div>
      <div class="form">
        <form action="" class="form-container">
          <p>
            This is just for practicing my skills learnt from the Oden Project.
            I would like to be a very knowlegable programmer and this is me
            pushing towards that dream.
          </p>
          <p>What do you think?</p>
          <br />
          <br />
          <h2>Let's do this!</h2>
          <div class="fieldset_container">
            <fieldset class="fieldst1">
              <label for="first_name">FIRST NAME</label>
              <br />
              <input type="text" id="first_name" name="first_name" />
              <br />
              <label for="email">EMAIL</label>
              <br />
              <input type="email" name="email" id="email" />
              <br />
              <label for="password">PASSWORD</label>
              <br />
              <input
                type="password"
                name="password"
                id="password"
                required
                minlength="8"
              />
            </fieldset>
            <fieldset class="fieldset2">
              <label for="last_name">LAST NAME</label>
              <br />
              <input type="text" id="last_name" name="last_name" />
              <br />
              <label for="number">PHONE NUMBER</label>
              <br />
              <input type="tel" name="number" id="number" />
              <br />
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <br />
              <input
                type="confirm_password"
                name="confirm_password"
                id="password"
                required
                minlength="8"
              />
            </fieldset>
          </div>
          <div class="submit_container">
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="">Log in</a></p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
